<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Novellino Wines × 7-Eleven Thailand</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100;0,300;0,400;0,600;0,700;1,300&family=Nunito:wght@200;300;400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"><\/script>
<style>
:root{
  --burg:#6A112A;--dgreen:#1A462B;--gold:#AE782A;--dburg:#301118;
  --mgreen:#24643D;--brown:#7E4F20;--mburg:#4D1320;--rose:#DD3B66;
  --lgold:#FEC669;--bg:#090305;--card:rgba(255,255,255,0.05);
  --cborder:rgba(255,255,255,0.09);--gborder:rgba(174,120,42,0.35);
  --text:#F5EDD8;--dim:rgba(245,237,216,0.55);
  --hf:"ITC Avant Garde Gothic","Century Gothic","Josefin Sans",sans-serif;
  --bf:"Avenir Next","Avenir","Nunito","Helvetica Neue",Arial,sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);overflow:hidden;}
body{font-family:var(--bf);}

/* chrome */
#chrome{position:fixed;top:0;left:0;right:0;z-index:300;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 10px;
  background:linear-gradient(to bottom,rgba(9,3,5,.88),transparent);
  pointer-events:none;}
#chrome img{height:26px;opacity:.55;}
#sctr{font-family:var(--hf);font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.3);}

/* slides */
#slides-wrap{width:100%;height:100dvh;position:relative;overflow:hidden;}
.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;
  padding:68px 22px 76px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  opacity:0;pointer-events:none;
  transition:opacity .42s ease,transform .42s ease;
  transform:translateX(55px);
}
.slide.active{opacity:1;pointer-events:all;transform:translateX(0);}
.slide.exit-left{opacity:0;transform:translateX(-55px);}
.slide.exit-right{opacity:0;transform:translateX(55px);}

/* bottom nav */
#bnav{position:fixed;bottom:0;left:0;right:0;z-index:300;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px 18px;
  background:linear-gradient(to top,rgba(9,3,5,.88),transparent);}
.nbtn{width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.07);color:white;font-size:16px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .2s;user-select:none;}
.nbtn:active{background:rgba(174,120,42,.3);border-color:var(--gold);}
#dots{display:flex;gap:6px;align-items:center;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25);
  cursor:pointer;transition:all .3s;}
.dot.active{background:var(--lgold);width:18px;border-radius:3px;}

/* typography */
.eyebrow{font-family:var(--hf);font-size:9px;letter-spacing:4px;color:var(--gold);
  text-transform:uppercase;margin-bottom:8px;text-align:center;width:100%;}
.stitle{font-family:var(--hf);font-size:21px;font-weight:300;letter-spacing:2px;
  text-transform:uppercase;text-align:center;line-height:1.25;}
.sdesc{font-family:var(--bf);font-size:12.5px;color:var(--dim);
  margin:10px auto 0;text-align:center;line-height:1.7;max-width:340px;}
.gline{width:80px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:12px auto 0;}
.hdr{text-align:center;margin-bottom:20px;width:100%;}

/* card */
.card{background:var(--card);border:1px solid var(--cborder);border-radius:12px;
  padding:18px 16px;position:relative;overflow:hidden;}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);}

/* ── SLIDE 1 ── */
#s1{justify-content:center;
  background:radial-gradient(ellipse at 30% 40%,rgba(106,17,42,.65) 0%,transparent 65%),
    radial-gradient(ellipse at 75% 70%,rgba(48,17,24,.5) 0%,transparent 55%),var(--bg);}
.cover-logo{max-width:270px;width:82%;
  filter:drop-shadow(0 0 28px rgba(174,120,42,.4));margin-bottom:4px;}
.wsub{font-family:var(--hf);font-size:10px;letter-spacing:8px;
  color:var(--lgold);margin-bottom:16px;}
.cdiv{width:110px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);margin-bottom:16px;}
.ctitle{font-family:var(--hf);font-size:17px;font-weight:300;letter-spacing:3px;
  text-transform:uppercase;text-align:center;margin-bottom:7px;}
.csub{font-size:13px;color:var(--dim);text-align:center;
  margin-bottom:26px;line-height:1.65;}
.badge{padding:10px 20px;border:1px solid var(--gborder);border-radius:4px;
  font-family:var(--hf);font-size:9px;letter-spacing:3px;
  color:var(--gold);text-transform:uppercase;text-align:center;}

/* ── SLIDE 2 STATS ── */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;width:100%;}
.scard{background:var(--card);border:1px solid var(--gborder);border-radius:12px;
  padding:18px 13px;text-align:center;position:relative;overflow:hidden;}
.scard::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.snum{font-family:var(--hf);font-size:30px;font-weight:700;
  color:var(--lgold);line-height:1;}
.slbl{font-size:11px;color:var(--dim);margin-top:5px;line-height:1.4;}
.snote{font-family:var(--hf);font-size:8px;letter-spacing:2px;
  color:rgba(254,198,105,.5);margin-top:4px;}

/* ── CHART ── */
.cwrap{background:var(--card);border:1px solid var(--cborder);
  border-radius:12px;padding:14px 12px 10px;width:100%;}
.cwrap canvas{max-height:210px;}

/* ── SLIDE 6 AF ── */
#s6{background:radial-gradient(ellipse at 20% 60%,rgba(26,70,43,.4) 0%,transparent 55%),var(--bg);}
.afcard{background:var(--card);border:1px solid rgba(36,100,61,.4);
  border-radius:10px;padding:14px;margin-top:12px;position:relative;overflow:hidden;}
.afcard::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#4ADE80,transparent);}
.afcard.rose{border-color:rgba(221,59,102,.4);}
.afcard.rose::before{background:linear-gradient(90deg,transparent,var(--rose),transparent);}
.afcard h4{font-family:var(--hf);font-size:9px;letter-spacing:2px;color:#4ADE80;
  text-transform:uppercase;margin-bottom:4px;}
.afcard.rose h4{color:var(--rose);}
.afcard .big{font-family:var(--hf);font-size:24px;font-weight:700;
  color:var(--lgold);line-height:1;}
.afcard.rose .big{color:var(--rose);}
.afcard p{font-size:11px;color:var(--dim);margin-top:3px;line-height:1.5;}
.prow{margin-top:9px;}
.plbl{display:flex;justify-content:space-between;font-family:var(--hf);
  font-size:9px;letter-spacing:1px;color:var(--dim);margin-bottom:3px;}
.ptrack{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
.pfill{height:100%;border-radius:3px;}
.pfill.af{background:linear-gradient(90deg,var(--dgreen),#4ADE80);}
.pfill.wine{background:linear-gradient(90deg,var(--mburg),var(--rose));}

/* ── SLIDE 7 TRENDS ── */
.tstack{display:flex;flex-direction:column;gap:11px;width:100%;}
.tcard{background:var(--card);border:1px solid var(--cborder);
  border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;}
.tico{font-size:26px;flex-shrink:0;}
.tnum{font-family:var(--hf);font-size:28px;font-weight:700;color:var(--lgold);line-height:1;}
.tlbl{font-size:11.5px;color:var(--dim);margin-top:3px;line-height:1.5;}
.tlbl strong{color:var(--text);}

/* ── SLIDE 8 THAILAND ── */
#s8{background:radial-gradient(ellipse at 75% 35%,rgba(26,70,43,.35) 0%,transparent 55%),var(--bg);}
.thstack{display:flex;flex-direction:column;gap:11px;width:100%;}
.thcard{background:var(--card);border:1px solid var(--cborder);
  border-radius:12px;padding:16px;}
.thcard .ti{font-size:22px;margin-bottom:5px;}
.thcard h3{font-family:var(--hf);font-size:9px;letter-spacing:3px;
  color:var(--gold);text-transform:uppercase;margin-bottom:5px;}
.thbig{font-family:var(--hf);font-size:26px;font-weight:700;color:var(--lgold);}
.thcard p{font-size:12px;color:var(--dim);margin-top:5px;line-height:1.6;}
.thcard strong{color:var(--text);}
.thvs{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap;}
.ttag{padding:3px 8px;border-radius:20px;font-size:10px;font-family:var(--hf);font-weight:600;}
.ttag.ph{background:rgba(106,17,42,.3);border:1px solid rgba(106,17,42,.5);color:var(--rose);}
.ttag.th{background:rgba(36,100,61,.3);border:1px solid rgba(36,100,61,.5);color:#4ADE80;}

/* ── SLIDE 9 ROI ── */
#s9{background:radial-gradient(ellipse at 50% 80%,rgba(174,120,42,.1) 0%,transparent 60%),var(--bg);}
.rpanel{background:var(--card);border:1px solid var(--gborder);
  border-radius:13px;padding:18px 16px;width:100%;
  position:relative;overflow:hidden;}
.rpanel::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.rpanel h3{font-family:var(--hf);font-size:9px;letter-spacing:4px;
  color:var(--gold);text-transform:uppercase;margin-bottom:16px;}
.rfield{margin-bottom:16px;}
.rtop{display:flex;justify-content:space-between;margin-bottom:5px;}
.rlbl{font-family:var(--hf);font-size:9px;letter-spacing:2px;
  color:var(--dim);text-transform:uppercase;}
.rval{font-family:var(--hf);font-size:15px;font-weight:700;color:var(--lgold);}
input[type=range]{width:100%;height:4px;border-radius:2px;outline:none;
  cursor:pointer;-webkit-appearance:none;appearance:none;
  background:rgba(255,255,255,.1);}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;
  width:22px;height:22px;border-radius:50%;background:var(--lgold);
  cursor:pointer;box-shadow:0 0 8px rgba(254,198,105,.5);}
.rrangelbl{display:flex;justify-content:space-between;font-size:9px;
  color:var(--dim);margin-top:3px;font-family:var(--hf);}
.rresults{background:var(--card);border:1px solid var(--gborder);
  border-radius:13px;padding:18px 16px;width:100%;margin-top:13px;
  position:relative;overflow:hidden;}
.rresults::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.rresults h3{font-family:var(--hf);font-size:9px;letter-spacing:4px;
  color:var(--gold);text-transform:uppercase;margin-bottom:14px;}
.rbig{font-family:var(--hf);font-size:36px;font-weight:700;
  color:var(--lgold);line-height:1;text-align:center;}
.rbiglbl{font-family:var(--hf);font-size:9px;letter-spacing:3px;
  color:var(--dim);text-align:center;margin-top:4px;margin-bottom:14px;}
.rrow{display:flex;justify-content:space-between;padding:9px 0;
  border-bottom:1px solid rgba(255,255,255,.06);}
.rrow:last-of-type{border-bottom:none;}
.rrow .ll{font-size:12px;color:var(--dim);}
.rrow .vv{font-family:var(--hf);font-size:13px;font-weight:600;color:var(--text);}
.rbartrack{height:8px;background:rgba(255,255,255,.07);
  border-radius:4px;overflow:hidden;margin-top:13px;}
.rbarfill{height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--gold),var(--lgold));transition:width .7s ease;}
.rupside{background:rgba(36,100,61,.12);border:1px solid rgba(36,100,61,.25);
  border-radius:8px;padding:11px;text-align:center;margin-top:11px;}
.rupside p{font-size:11px;color:var(--dim);line-height:1.6;}
.rupside strong{color:var(--lgold);font-size:15px;}

/* ── SLIDE 10 CTA ── */
#s10{justify-content:center;text-align:center;
  background:radial-gradient(ellipse at 30% 50%,rgba(36,100,61,.35) 0%,transparent 55%),
    radial-gradient(ellipse at 70% 30%,rgba(106,17,42,.35) 0%,transparent 50%),var(--bg);}
.ctalogo{max-width:240px;width:78%;
  filter:drop-shadow(0 0 22px rgba(174,120,42,.4));margin-bottom:4px;}
.ctawines{font-family:var(--hf);font-size:9px;letter-spacing:8px;
  color:var(--lgold);margin-bottom:20px;}
.ctatitle{font-family:var(--hf);font-size:18px;font-weight:300;
  letter-spacing:3px;text-transform:uppercase;margin-bottom:7px;}
.ctasub{font-size:12.5px;color:var(--dim);margin-bottom:22px;
  line-height:1.7;max-width:310px;}
.ctagrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;
  width:100%;max-width:360px;}
.ctacard{background:var(--card);border:1px solid var(--gborder);
  border-radius:10px;padding:13px 11px;text-align:center;}
.ctacard .ic{font-size:19px;margin-bottom:4px;}
.ctacard h4{font-family:var(--hf);font-size:8px;letter-spacing:2px;
  color:var(--gold);text-transform:uppercase;margin-bottom:3px;}
.ctacard p{font-size:11px;color:var(--dim);line-height:1.4;}
.ctacard strong{color:var(--text);}
</style>
</head>

sw.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
sw.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>45){dx<0?go(1):go(-1);}
},{passive:true});

/* keyboard */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')go(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')go(-1);
});

/* dots */
const dotsEl=document.getElementById('dots');
for(let i=0;i<N;i++){
  const d=document.createElement('div');
  d.className='dot'+(i===0?' active':'');
  d.onclick=()=>{const diff=i-cur;if(diff!==0)go(diff);};
  dotsEl.appendChild(d);
}
function dots(){document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===cur));}

/* counters */
function animCounters(){
  document.querySelectorAll('.counter').forEach(el=>{
    const tgt=+el.dataset.target,fmt=el.dataset.format;
    const dur=1500,step=16,steps=dur/step,inc=tgt/steps;
    let n=0;
    const t=setInterval(()=>{
      n=Math.min(n+inc,tgt);
      const v=Math.round(n);
      el.textContent=fmt==='comma'?v.toLocaleString():fmt==='pct'?v+'%':v;
      if(n>=tgt)clearInterval(t);
    },step);
  });
}

/* chart defaults */
Chart.defaults.color='rgba(245,237,216,0.4)';
Chart.defaults.font.family="'Josefin Sans',sans-serif";
Chart.defaults.font.size=10;
const gr={color:'rgba(255,255,255,0.06)',drawBorder:false};
const tk={color:'rgba(245,237,216,0.4)',font:{size:9}};
const tp={backgroundColor:'rgba(12,4,8,0.92)',borderColor:'rgba(174,120,42,0.4)',borderWidth:1};
function fmtN(n){return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1000?(n/1000).toFixed(0)+'K':n;}

function buildChart(idx){
  if(built[idx])return; built[idx]=true;

  if(idx===2){
    new Chart(document.getElementById('chart-sales'),{
      data:{labels:years,datasets:[
        {type:'bar',label:'Bottles Sold',data:totalSales,
          backgroundColor:years.map((_,i)=>'rgba(174,120,42,'+(0.45+i*0.08)+')'),
          borderRadius:4,yAxisID:'y'},
        {type:'line',label:'Store Count',data:storeCount,
          borderColor:'#FEC669',backgroundColor:'rgba(254,198,105,0.07)',
          borderWidth:2,pointRadius:3,pointBackgroundColor:'#FEC669',
          tension:0.4,fill:false,yAxisID:'y1'}
      ]},
      options:{responsive:true,maintainAspectRatio:true,aspectRatio:1.75,
        interaction:{mode:'index',intersect:false},
        plugins:{legend:{labels:{color:'rgba(245,237,216,0.55)',boxWidth:9,padding:9,font:{size:9}}},tooltip:tp},
        scales:{x:{grid:gr,ticks:tk},
          y:{grid:gr,ticks:{...tk,callback:v=>fmtN(v)}},
          y1:{position:'right',grid:{display:false},ticks:{...tk,callback:v=>v.toLocaleString()}}}}

  }

  if(idx===3){
    new Chart(document.getElementById('chart-portfolio'),{
      type:'bar',

      options:{responsive:true,maintainAspectRatio:true,aspectRatio:1.6,
        plugins:{legend:{labels:{color:'rgba(245,237,216,0.5)',boxWidth:8,padding:6,font:{size:8}}},
          tooltip:{...tp,callbacks:{label:c=>c.dataset.label+': '+c.parsed.y.toLocaleString()}}},
        scales:{x:{stacked:true,grid:gr,ticks:tk},
          y:{stacked:true,grid:gr,ticks:{...tk,callback:v=>fmtN(v)}}}}
    });
  }

  if(idx===4){
    new Chart(document.getElementById('chart-efficiency'),{
      type:'line',
      data:{labels:years,datasets:[
        {label:'Bottles/Store/Month',data:perStore,borderColor:'#FEC669',
          backgroundColor:'rgba(174,120,42,0.15)',borderWidth:2.5,
          pointRadius:5,pointBackgroundColor:'#FEC669',
          pointBorderColor:'#090305',pointBorderWidth:2,tension:0.4,fill:true},

          borderColor:'rgba(221,59,102,0.5)',borderDash:[5,4],
          borderWidth:1.5,pointRadius:0,fill:false}
      ]},
      options:{responsive:true,maintainAspectRatio:true,aspectRatio:1.75,
        plugins:{legend:{labels:{color:'rgba(245,237,216,0.55)',boxWidth:9,padding:9,font:{size:9}}},tooltip:tp},
        scales:{x:{grid:gr,ticks:tk},
          y:{grid:gr,ticks:tk,min:4,max:12}}}
    });
  }

  if(idx===5){
    new Chart(document.getElementById('chart-af'),{
      type:'line',
      data:{labels:years,datasets:[{
        label:'AF % of Total Sales',data:afPct,
        borderColor:'#4ADE80',backgroundColor:'rgba(36,100,61,0.2)',
        borderWidth:2.5,pointRadius:4,pointBackgroundColor:'#4ADE80',
        tension:0.4,fill:true
      }]},
      options:{responsive:true,maintainAspectRatio:true,aspectRatio:2,
        plugins:{legend:{display:false},
          tooltip:{...tp,callbacks:{label:c=>'AF Share: '+c.parsed.y.toFixed(1)+'%'}}},
        scales:{x:{grid:gr,ticks:tk},
          y:{grid:gr,max:40,ticks:{...tk,callback:v=>v+'%'}}}}

buildChart(0);

/* ROI */
function fmtB(n){return '฿'+Math.round(n).toLocaleString();}
function updateROI(){
  const s=+document.getElementById('sl-stores').value;
  const p=+document.getElementById('sl-srp').value;
  const b=+document.getElementById('sl-btl').value;
  document.getElementById('val-stores').textContent=s.toLocaleString();
  document.getElementById('val-srp').textContent=p+' ฿';
  document.getElementById('val-btl').textContent=b;
  const mo=s*p*b,yr=mo*12,yb=s*b*12,full=15430*p*b*12;
  document.getElementById('out-annual').textContent=fmtB(yr);
  document.getElementById('out-monthly').textContent=fmtB(mo);
  document.getElementById('out-btls').textContent=yb.toLocaleString()+' btl';
  document.getElementById('out-usd').textContent='$'+Math.round(yr/34).toLocaleString();
  document.getElementById('out-full').textContent=fmtB(full);
  const pct=Math.min(yr/200000000*100,100);
  document.getElementById('roi-bar').style.width=pct+'%';
  [['sl-stores',50,5000],['sl-srp',39,599],['sl-btl',1,25]].forEach(([id,mn,mx])=>{
    const el=document.getElementById(id);
    const p2=(el.value-mn)/(mx-mn)*100;
    el.style.background='linear-gradient(90deg,#AE782A '+p2+'%,rgba(255,255,255,0.1) '+p2+'%)';
  });
}
updateROI();
